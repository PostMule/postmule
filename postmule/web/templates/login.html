<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PostMule — Login</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-body">
  <div class="login-card">
    <h1>Post<span style="color:#E8A020;">Mule</span></h1>
    <form method="post">
      {% if error %}<div class="login-error">{{ error }}</div>{% endif %}
      <input class="login-input" type="password" name="password" placeholder="Dashboard password" autofocus>
      <button class="login-btn" type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>
