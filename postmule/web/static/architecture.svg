<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8A9BB0"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2563EB"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="#F8FAFD" rx="12"/>

  <!-- ── INGESTION ZONE ── -->
  <rect x="16" y="14" width="200" height="260" rx="10" fill="#EEF3FB" stroke="#C5D2E8" stroke-width="1.5"/>
  <text x="116" y="34" text-anchor="middle" font-size="10" font-weight="700" fill="#5A7090" letter-spacing="0.08em">INGESTION</text>

  <!-- VPM box -->
  <rect x="30" y="44" width="172" height="52" rx="8" fill="#fff" stroke="#C5D2E8" stroke-width="1.5"/>
  <text x="116" y="64" text-anchor="middle" font-size="12" font-weight="600" fill="#0F2044">Virtual Mailbox</text>
  <text x="116" y="80" text-anchor="middle" font-size="10" fill="#5A7090">VPM, Earth Class Mail…</text>

  <!-- Email notification box -->
  <rect x="30" y="112" width="172" height="52" rx="8" fill="#fff" stroke="#C5D2E8" stroke-width="1.5"/>
  <text x="116" y="132" text-anchor="middle" font-size="12" font-weight="600" fill="#0F2044">Email (Notifications)</text>
  <text x="116" y="148" text-anchor="middle" font-size="10" fill="#5A7090">Gmail, Outlook, IMAP</text>

  <!-- Bill intake box -->
  <rect x="30" y="180" width="172" height="52" rx="8" fill="#fff" stroke="#C5D2E8" stroke-width="1.5"/>
  <text x="116" y="200" text-anchor="middle" font-size="12" font-weight="600" fill="#0F2044">Email (Bill Intake)</text>
  <text x="116" y="216" text-anchor="middle" font-size="10" fill="#5A7090">Biller PDF attachments</text>

  <!-- arrows: VPM → Email notif -->
  <line x1="116" y1="96" x2="116" y2="110" stroke="#8A9BB0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- arrow label -->
  <text x="122" y="106" font-size="9" fill="#8A9BB0">scan email</text>

  <!-- ── PIPELINE ZONE ── -->
  <rect x="236" y="14" width="200" height="260" rx="10" fill="#EEF3FB" stroke="#C5D2E8" stroke-width="1.5"/>
  <text x="336" y="34" text-anchor="middle" font-size="10" font-weight="700" fill="#5A7090" letter-spacing="0.08em">PIPELINE</text>

  <!-- Inbox box -->
  <rect x="250" y="44" width="172" height="52" rx="8" fill="#fff" stroke="#C5D2E8" stroke-width="1.5"/>
  <text x="336" y="64" text-anchor="middle" font-size="12" font-weight="600" fill="#0F2044">Inbox (Cloud)</text>
  <text x="336" y="80" text-anchor="middle" font-size="10" fill="#5A7090">PDFs uploaded here first</text>

  <!-- OCR box -->
  <rect x="250" y="112" width="172" height="52" rx="8" fill="#fff" stroke="#C5D2E8" stroke-width="1.5"/>
  <text x="336" y="132" text-anchor="middle" font-size="12" font-weight="600" fill="#0F2044">OCR</text>
  <text x="336" y="148" text-anchor="middle" font-size="10" fill="#5A7090">pdfplumber → pytesseract</text>

  <!-- LLM box -->
  <rect x="250" y="180" width="172" height="52" rx="8" fill="#fff" stroke="#C5D2E8" stroke-width="1.5"/>
  <text x="336" y="200" text-anchor="middle" font-size="12" font-weight="600" fill="#0F2044">LLM Classify</text>
  <text x="336" y="216" text-anchor="middle" font-size="10" fill="#5A7090">Gemini, OpenAI, Ollama…</text>

  <!-- Pipeline arrows -->
  <line x1="336" y1="96" x2="336" y2="110" stroke="#8A9BB0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="336" y1="164" x2="336" y2="178" stroke="#8A9BB0" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Ingestion → Inbox arrows -->
  <line x1="202" y1="138" x2="248" y2="72" stroke="#8A9BB0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="202" y1="206" x2="248" y2="80" stroke="#8A9BB0" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── STORAGE ZONE ── -->
  <rect x="456" y="14" width="200" height="260" rx="10" fill="#EEF3FB" stroke="#C5D2E8" stroke-width="1.5"/>
  <text x="556" y="34" text-anchor="middle" font-size="10" font-weight="700" fill="#5A7090" letter-spacing="0.08em">STORAGE</text>

  <!-- Cloud Storage box -->
  <rect x="470" y="44" width="172" height="52" rx="8" fill="#fff" stroke="#C5D2E8" stroke-width="1.5"/>
  <text x="556" y="64" text-anchor="middle" font-size="12" font-weight="600" fill="#0F2044">Cloud Storage</text>
  <text x="556" y="80" text-anchor="middle" font-size="10" fill="#5A7090">Google Drive, S3, Dropbox</text>

  <!-- JSON box (source of truth) -->
  <rect x="470" y="112" width="172" height="52" rx="8" fill="#EBF2FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="556" y="132" text-anchor="middle" font-size="12" font-weight="600" fill="#1D40B0">JSON Files</text>
  <text x="556" y="148" text-anchor="middle" font-size="10" fill="#2563EB">Source of truth</text>

  <!-- Sheets box -->
  <rect x="470" y="180" width="172" height="52" rx="8" fill="#fff" stroke="#C5D2E8" stroke-width="1.5"/>
  <text x="556" y="200" text-anchor="middle" font-size="12" font-weight="600" fill="#0F2044">Spreadsheet View</text>
  <text x="556" y="216" text-anchor="middle" font-size="10" fill="#5A7090">Google Sheets — generated</text>

  <!-- Pipeline → Storage arrows -->
  <line x1="422" y1="206" x2="468" y2="72" stroke="#8A9BB0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- label: rename + move -->
  <text x="430" y="148" font-size="9" fill="#8A9BB0" transform="rotate(-55 430 148)">rename + move</text>

  <!-- Storage internal arrows -->
  <line x1="556" y1="96" x2="556" y2="110" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="556" y1="164" x2="556" y2="178" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- ── OUTPUT ZONE ── -->
  <rect x="676" y="14" width="210" height="260" rx="10" fill="#EEF3FB" stroke="#C5D2E8" stroke-width="1.5"/>
  <text x="781" y="34" text-anchor="middle" font-size="10" font-weight="700" fill="#5A7090" letter-spacing="0.08em">OUTPUT</text>

  <!-- Dashboard box -->
  <rect x="690" y="44" width="182" height="52" rx="8" fill="#fff" stroke="#C5D2E8" stroke-width="1.5"/>
  <text x="781" y="64" text-anchor="middle" font-size="12" font-weight="600" fill="#0F2044">Web Dashboard</text>
  <text x="781" y="80" text-anchor="middle" font-size="10" fill="#5A7090">localhost:5000</text>

  <!-- Notifications box -->
  <rect x="690" y="112" width="182" height="52" rx="8" fill="#fff" stroke="#C5D2E8" stroke-width="1.5"/>
  <text x="781" y="132" text-anchor="middle" font-size="12" font-weight="600" fill="#0F2044">Alert Email</text>
  <text x="781" y="148" text-anchor="middle" font-size="10" fill="#5A7090">Daily summary + urgent</text>

  <!-- JSON → Dashboard -->
  <line x1="642" y1="138" x2="688" y2="72" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <!-- JSON → Notifications -->
  <line x1="642" y1="145" x2="688" y2="138" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- ── BOTTOM ROW: Finance + Bill Matching ── -->
  <rect x="236" y="300" width="200" height="200" rx="10" fill="#EEF3FB" stroke="#C5D2E8" stroke-width="1.5"/>
  <text x="336" y="320" text-anchor="middle" font-size="10" font-weight="700" fill="#5A7090" letter-spacing="0.08em">FINANCE</text>

  <!-- Finance Provider box -->
  <rect x="250" y="330" width="172" height="52" rx="8" fill="#fff" stroke="#C5D2E8" stroke-width="1.5"/>
  <text x="336" y="350" text-anchor="middle" font-size="12" font-weight="600" fill="#0F2044">Finance Provider</text>
  <text x="336" y="366" text-anchor="middle" font-size="10" fill="#5A7090">YNAB, Plaid, Simplifi</text>

  <!-- Bill Matching box -->
  <rect x="250" y="398" width="172" height="52" rx="8" fill="#fff" stroke="#C5D2E8" stroke-width="1.5"/>
  <text x="336" y="418" text-anchor="middle" font-size="12" font-weight="600" fill="#0F2044">Bill Matching</text>
  <text x="336" y="434" text-anchor="middle" font-size="10" fill="#5A7090">Amount + date exact match</text>

  <line x1="336" y1="382" x2="336" y2="396" stroke="#8A9BB0" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Entity Discovery box -->
  <rect x="456" y="300" width="200" height="200" rx="10" fill="#EEF3FB" stroke="#C5D2E8" stroke-width="1.5"/>
  <text x="556" y="320" text-anchor="middle" font-size="10" font-weight="700" fill="#5A7090" letter-spacing="0.08em">INTELLIGENCE</text>

  <rect x="470" y="330" width="172" height="52" rx="8" fill="#fff" stroke="#C5D2E8" stroke-width="1.5"/>
  <text x="556" y="350" text-anchor="middle" font-size="12" font-weight="600" fill="#0F2044">Entity Discovery</text>
  <text x="556" y="366" text-anchor="middle" font-size="10" fill="#5A7090">Fuzzy alias matching</text>

  <rect x="470" y="398" width="172" height="52" rx="8" fill="#fff" stroke="#C5D2E8" stroke-width="1.5"/>
  <text x="556" y="418" text-anchor="middle" font-size="12" font-weight="600" fill="#0F2044">Entity Database</text>
  <text x="556" y="434" text-anchor="middle" font-size="10" fill="#5A7090">entities.json</text>

  <line x1="556" y1="382" x2="556" y2="396" stroke="#8A9BB0" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- JSON → Bill Matching (down) -->
  <line x1="470" y1="164" x2="388" y2="396" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow-blue)"/>

  <!-- JSON → Entity Discovery -->
  <line x1="556" y1="232" x2="556" y2="328" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow-blue)"/>

  <!-- Bill Matching → Dashboard -->
  <line x1="422" y1="424" x2="690" y2="112" stroke="#8A9BB0" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- Entity Discovery → Dashboard -->
  <line x1="642" y1="356" x2="690" y2="92" stroke="#8A9BB0" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="676" y="300" width="210" height="200" rx="10" fill="#F8FAFD" stroke="#DDE3EC" stroke-width="1"/>
  <text x="781" y="320" text-anchor="middle" font-size="10" font-weight="700" fill="#5A7090" letter-spacing="0.08em">LEGEND</text>
  <line x1="696" y1="340" x2="730" y2="340" stroke="#8A9BB0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="738" y="344" font-size="10" fill="#5A7090">Data flow</text>
  <line x1="696" y1="360" x2="730" y2="360" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="738" y="364" font-size="10" fill="#5A7090">JSON-driven flow</text>
  <line x1="696" y1="380" x2="730" y2="380" stroke="#8A9BB0" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="738" y="384" font-size="10" fill="#5A7090">Async / on-demand</text>
  <rect x="696" y="398" width="14" height="14" rx="3" fill="#EBF2FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="718" y="409" font-size="10" fill="#5A7090">Source of truth</text>
</svg>
