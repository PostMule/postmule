name: Installer Build

on:
  push:
    branches: [main]
    paths:
      - "installer/**"
      - "postmule/cli.py"
      - "postmule/providers/**"
      - "postmule/pipeline.py"
      - "config.example.yaml"
  pull_request:
    paths:
      - "installer/**"
      - "postmule/cli.py"
      - "postmule/providers/**"
      - "postmule/pipeline.py"
      - "config.example.yaml"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
        # Note: playwright browser binaries are not needed for the installer build.

      - name: Build exe with PyInstaller
        run: pyinstaller installer/postmule.spec --noconfirm

      - name: Verify exe exists
        run: |
          if (-not (Test-Path "dist\postmule\postmule.exe")) {
            Write-Error "postmule.exe not found after PyInstaller build."
            exit 1
          }
          Write-Host "postmule.exe found."
        shell: pwsh

      - name: Smoke-test exe (configure --help)
        run: dist\postmule\postmule.exe configure --help
        shell: cmd

      - name: Smoke-test exe (run --help)
        run: dist\postmule\postmule.exe run --help
        shell: cmd

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress
        shell: pwsh

      - name: Compile installer with ISCC
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc installer\postmule.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        shell: pwsh

      - name: Verify installer exists and is non-empty
        run: |
          $setup = "dist\PostMuleSetup.exe"
          if (-not (Test-Path $setup)) {
            Write-Error "PostMuleSetup.exe not found."
            exit 1
          }
          $size = (Get-Item $setup).Length
          if ($size -eq 0) {
            Write-Error "PostMuleSetup.exe is empty."
            exit 1
          }
          $sizeMB = [math]::Round($size / 1MB, 1)
          Write-Host "PostMuleSetup.exe: $sizeMB MB"
        shell: pwsh

      # Upload the installer as a build artifact on pushes to main only.
      - name: Upload installer artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: PostMuleSetup
          path: dist/PostMuleSetup.exe
          retention-days: 30
