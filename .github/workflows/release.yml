name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build exe with PyInstaller
        run: pyinstaller installer/postmule.spec --noconfirm

      - name: Verify exe exists
        run: |
          if (-not (Test-Path "dist\postmule\postmule.exe")) {
            Write-Error "postmule.exe not found after PyInstaller build."
            exit 1
          }
          Write-Host "postmule.exe found."
        shell: pwsh

      - name: Smoke-test exe (configure --help)
        run: dist\postmule\postmule.exe configure --help
        shell: cmd

      - name: Smoke-test exe (run --help)
        run: dist\postmule\postmule.exe run --help
        shell: cmd

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress
        shell: pwsh

      - name: Compile installer with ISCC
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc installer\postmule.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        shell: pwsh

      - name: Verify installer exists and is non-empty
        run: |
          $setup = "dist\PostMuleSetup.exe"
          if (-not (Test-Path $setup)) {
            Write-Error "PostMuleSetup.exe not found."
            exit 1
          }
          $size = (Get-Item $setup).Length
          if ($size -eq 0) {
            Write-Error "PostMuleSetup.exe is empty."
            exit 1
          }
          $sizeMB = [math]::Round($size / 1MB, 1)
          Write-Host "PostMuleSetup.exe: $sizeMB MB"
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PostMuleSetup.exe
          generate_release_notes: true
