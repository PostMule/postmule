# PostMule credentials template
# Copy this to credentials.yaml, fill in values, then run: postmule encrypt-credentials
# credentials.yaml is in .gitignore — NEVER commit it to GitHub.
# After encryption, credentials.enc is used; credentials.yaml can be deleted.

google:
  # OAuth2 client credentials — obtained automatically during setup wizard.
  # Do not edit manually unless you know what you are doing.
  client_id: ""
  client_secret: ""
  # Refresh token stored here after first OAuth login.
  refresh_token: ""

gemini:
  # Gemini API key — obtained automatically during setup wizard via browser automation.
  # Free tier: 1500 req/day, 1M tokens/day.
  api_key: ""

vpm:
  # VirtualPostMail login — only needed if using VPM mailbox provider directly.
  # Leave blank if using Gmail ingestion (recommended).
  username: ""
  password: ""

simplifi:
  # Simplifi by Quicken credentials — only needed if using Simplifi finance provider.
  username: ""
  password: ""

# Additional provider credentials follow the same pattern.
# See config.example.yaml for which providers are active.
