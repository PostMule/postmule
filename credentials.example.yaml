# PostMule credentials template
# Copy this to credentials.yaml, fill in values, then run: postmule encrypt-credentials
# credentials.yaml is in .gitignore — NEVER commit it to GitHub.
# After encryption, credentials.enc is used; credentials.yaml can be deleted.

# ---------------------------------------------------------------------------
# Email accounts (IMAP — default provider, no Google Cloud setup required)
# Each account is keyed by its `id` field in config.yaml → email.providers.
# Gmail users: generate an App Password at myaccount.google.com/apppasswords.
# ---------------------------------------------------------------------------
accounts:
  main:
    username: ""          # e.g. YourMailManagement@gmail.com
    password: ""          # App password (not your Google account password)
  # bills:                # Uncomment if you have a bill_intake account configured
  #   username: ""
  #   password: ""

gemini:
  # Gemini API key — obtained automatically during setup wizard via browser automation.
  # Free tier: 1500 req/day, 1M tokens/day.
  api_key: ""

# ---------------------------------------------------------------------------
# Google (optional — only needed if using Google Drive, Sheets, or Gmail API)
# ---------------------------------------------------------------------------
# google:
#   OAuth2 refresh token — stored in system keyring after running:
#   postmule connect-google
#   Do not add Google credentials here unless using a Google provider.

vpm:
  # VirtualPostMail login — only needed if using VPM mailbox provider directly.
  # Leave blank if using email IMAP ingestion.
  username: ""
  password: ""

simplifi:
  # Simplifi by Quicken credentials — only needed if using Simplifi finance provider.
  username: ""
  password: ""

ynab:
  # YNAB Personal Access Token — only needed if using YNAB finance provider.
  # Create one at: app.ynab.com → Account Settings → Developer Settings
  access_token: ""
  # Optional: override which budget to use. Defaults to "last-used".
  budget_id: "last-used"

plaid:
  # Plaid credentials — only needed if using Plaid finance provider.
  # Obtain from: dashboard.plaid.com → Team Settings → Keys
  client_id: ""
  secret: ""          # Use the development (or sandbox) secret key
  # Per-institution access token — obtained by running the Plaid Link flow once per bank.
  # See: https://plaid.com/docs/link/
  access_token: ""

monarch:
  # Monarch Money credentials — only needed if using Monarch finance provider.
  # NOTE: Uses browser automation (no public API). Labeled experimental.
  username: ""
  password: ""

# Additional provider credentials follow the same pattern.
# See config.example.yaml for which providers are active.
